<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Main body gradient: pink to indigo -->
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F78B97"/>
      <stop offset="100%" stop-color="#9B6B8A"/>
    </linearGradient>
    <!-- Head highlight gradient -->
    <radialGradient id="headHighlight" cx="0.4" cy="0.35" r="0.5">
      <stop offset="0%" stop-color="#FBA8B2"/>
      <stop offset="100%" stop-color="#F78B97"/>
    </radialGradient>
    <!-- Tentacle gradient -->
    <linearGradient id="tentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E07A88"/>
      <stop offset="100%" stop-color="#3B3E73"/>
    </linearGradient>
    <!-- Outer tentacle gradient (lighter) -->
    <linearGradient id="tentGradOuter" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#F78B97"/>
      <stop offset="100%" stop-color="#4E4F8A"/>
    </linearGradient>
    <!-- Sucker color -->
    <linearGradient id="suckerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBC0C8"/>
      <stop offset="100%" stop-color="#E8A0AA"/>
    </linearGradient>
    <!-- Eye white gradient -->
    <radialGradient id="eyeWhite" cx="0.45" cy="0.4" r="0.55">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0EEF5"/>
    </radialGradient>
    <!-- Shadow beneath head -->
    <radialGradient id="headShadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#3B3E73" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3B3E73" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- === TENTACLES (behind body) === -->
  <!-- 8 tentacles arranged symmetrically, stylized as tapered curves -->

  <!-- Tentacle 1: far left -->
  <path d="M34,68 C26,78 14,88 10,100 C8,106 12,112 16,110 C20,108 22,102 26,94 C30,86 36,78 40,72"
        fill="none" stroke="url(#tentGradOuter)" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Sucker dots -->
  <circle cx="18" cy="98" r="1.5" fill="url(#suckerGrad)" opacity="0.7"/>
  <circle cx="22" cy="92" r="1.3" fill="url(#suckerGrad)" opacity="0.6"/>

  <!-- Tentacle 2: left -->
  <path d="M42,72 C34,82 26,94 22,108 C20,114 24,118 28,116 C32,114 34,106 38,96 C42,86 46,78 48,74"
        fill="none" stroke="url(#tentGrad)" stroke-width="5" stroke-linecap="round"/>
  <circle cx="26" cy="108" r="1.5" fill="url(#suckerGrad)" opacity="0.7"/>
  <circle cx="30" cy="102" r="1.3" fill="url(#suckerGrad)" opacity="0.6"/>

  <!-- Tentacle 3: inner left -->
  <path d="M50,74 C46,86 42,98 44,110 C45,116 50,118 52,114 C54,110 52,102 52,94 C52,86 54,78 56,74"
        fill="none" stroke="url(#tentGrad)" stroke-width="4.5" stroke-linecap="round"/>
  <circle cx="46" cy="108" r="1.4" fill="url(#suckerGrad)" opacity="0.65"/>

  <!-- Tentacle 4: center left (curls forward slightly) -->
  <path d="M56,76 C54,86 54,96 58,106 C60,112 64,114 66,110 C68,106 64,98 62,90 C60,84 60,78 60,76"
        fill="none" stroke="url(#tentGrad)" stroke-width="4" stroke-linecap="round"/>

  <!-- Tentacle 5: center right (curls forward slightly) -->
  <path d="M72,76 C74,86 74,96 70,106 C68,112 64,114 62,110 C60,106 64,98 66,90 C68,84 68,78 68,76"
        fill="none" stroke="url(#tentGrad)" stroke-width="4" stroke-linecap="round"/>

  <!-- Tentacle 6: inner right -->
  <path d="M78,74 C82,86 86,98 84,110 C83,116 78,118 76,114 C74,110 76,102 76,94 C76,86 74,78 72,74"
        fill="none" stroke="url(#tentGrad)" stroke-width="4.5" stroke-linecap="round"/>
  <circle cx="82" cy="108" r="1.4" fill="url(#suckerGrad)" opacity="0.65"/>

  <!-- Tentacle 7: right -->
  <path d="M86,72 C94,82 102,94 106,108 C108,114 104,118 100,116 C96,114 94,106 90,96 C86,86 82,78 80,74"
        fill="none" stroke="url(#tentGrad)" stroke-width="5" stroke-linecap="round"/>
  <circle cx="102" cy="108" r="1.5" fill="url(#suckerGrad)" opacity="0.7"/>
  <circle cx="98" cy="102" r="1.3" fill="url(#suckerGrad)" opacity="0.6"/>

  <!-- Tentacle 8: far right (curls up confidently) -->
  <path d="M94,68 C102,78 114,88 118,100 C120,106 116,112 112,110 C108,108 106,102 102,94 C98,86 92,78 88,72"
        fill="none" stroke="url(#tentGradOuter)" stroke-width="5.5" stroke-linecap="round"/>
  <circle cx="110" cy="98" r="1.5" fill="url(#suckerGrad)" opacity="0.7"/>
  <circle cx="106" cy="92" r="1.3" fill="url(#suckerGrad)" opacity="0.6"/>

  <!-- === HEAD SHADOW === -->
  <ellipse cx="64" cy="68" rx="30" ry="6" fill="url(#headShadow)"/>

  <!-- === MANTLE/HEAD === -->
  <!-- Main head shape: rounded dome -->
  <path d="M30,62 C30,30 38,12 64,12 C90,12 98,30 98,62 C98,72 90,76 64,76 C38,76 30,72 30,62 Z"
        fill="url(#headHighlight)"/>
  <!-- Head shading overlay for depth -->
  <path d="M30,62 C30,30 38,12 64,12 C90,12 98,30 98,62 C98,72 90,76 64,76 C38,76 30,72 30,62 Z"
        fill="url(#bodyGrad)" opacity="0.3"/>

  <!-- Subtle geometric facet lines on the head for tech feel -->
  <path d="M44,18 L50,38" stroke="#3B3E73" stroke-width="0.5" stroke-opacity="0.12" stroke-linecap="round"/>
  <path d="M84,18 L78,38" stroke="#3B3E73" stroke-width="0.5" stroke-opacity="0.12" stroke-linecap="round"/>
  <path d="M64,12 L64,28" stroke="#3B3E73" stroke-width="0.5" stroke-opacity="0.1" stroke-linecap="round"/>
  <!-- Hex-like accent on forehead -->
  <path d="M56,20 L64,16 L72,20 L72,28 L64,32 L56,28 Z"
        fill="none" stroke="#3B3E73" stroke-width="0.7" stroke-opacity="0.15"/>

  <!-- === EYES === -->
  <!-- Left eye -->
  <ellipse cx="50" cy="48" rx="10" ry="11" fill="url(#eyeWhite)"/>
  <ellipse cx="50" cy="48" rx="10" ry="11" fill="none" stroke="#3B3E73" stroke-width="1.2" stroke-opacity="0.2"/>
  <!-- Left iris -->
  <ellipse cx="52" cy="48" rx="6" ry="7" fill="#3B3E73"/>
  <!-- Left pupil -->
  <ellipse cx="53" cy="47" rx="3" ry="3.5" fill="#1D1F3E"/>
  <!-- Left eye shine -->
  <circle cx="55" cy="44" r="2" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="50" cy="50" r="1" fill="#FFFFFF" opacity="0.4"/>

  <!-- Right eye -->
  <ellipse cx="78" cy="48" rx="10" ry="11" fill="url(#eyeWhite)"/>
  <ellipse cx="78" cy="48" rx="10" ry="11" fill="none" stroke="#3B3E73" stroke-width="1.2" stroke-opacity="0.2"/>
  <!-- Right iris -->
  <ellipse cx="80" cy="48" rx="6" ry="7" fill="#3B3E73"/>
  <!-- Right pupil -->
  <ellipse cx="81" cy="47" rx="3" ry="3.5" fill="#1D1F3E"/>
  <!-- Right eye shine -->
  <circle cx="83" cy="44" r="2" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="78" cy="50" r="1" fill="#FFFFFF" opacity="0.4"/>

  <!-- Slight brow ridge for confident look -->
  <path d="M38,38 C42,35 48,34 54,36" fill="none" stroke="#3B3E73" stroke-width="1.5" stroke-opacity="0.2" stroke-linecap="round"/>
  <path d="M90,38 C86,35 80,34 74,36" fill="none" stroke="#3B3E73" stroke-width="1.5" stroke-opacity="0.2" stroke-linecap="round"/>

  <!-- === MOUTH: subtle confident smirk === -->
  <path d="M56,60 C60,64 68,64 72,60" fill="none" stroke="#3B3E73" stroke-width="1.5" stroke-opacity="0.35" stroke-linecap="round"/>
  <!-- Slight smirk uptick on right side -->
  <path d="M72,60 C74,58 75,57" fill="none" stroke="#3B3E73" stroke-width="1.2" stroke-opacity="0.25" stroke-linecap="round"/>

  <!-- === HEAD HIGHLIGHT (specular) === -->
  <ellipse cx="52" cy="22" rx="14" ry="6" fill="#FFFFFF" opacity="0.15" transform="rotate(-8 52 22)"/>
</svg>