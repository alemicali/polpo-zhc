<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 380" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#aaa"/>
    </marker>
  </defs>

  <!-- Start: Orchestrator restarts -->
  <rect x="160" y="20" width="200" height="36" rx="18" fill="#f8f8f8" stroke="#888" stroke-width="1.5"/>
  <text x="260" y="43" font-size="12" fill="#333" text-anchor="middle" font-weight="500">Orchestrator restarts</text>

  <!-- Step 1 -->
  <line x1="260" y1="56" x2="260" y2="80" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="120" y="80" width="280" height="36" rx="5" fill="#f8f8f8" stroke="#888" stroke-width="1.2"/>
  <text x="260" y="103" font-size="11" fill="#333" text-anchor="middle">Read RunStore: find state = "running"</text>

  <!-- Step 2: For each -->
  <line x1="260" y1="116" x2="260" y2="145" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="268" y="136" font-size="9" fill="#aaa" font-style="italic">for each running record</text>

  <!-- Diamond: PID alive? -->
  <polygon points="260,148 310,178 260,208 210,178" fill="#f8f8f8" stroke="#888" stroke-width="1.2"/>
  <text x="260" y="175" font-size="10" fill="#666" text-anchor="middle">PID</text>
  <text x="260" y="186" font-size="10" fill="#666" text-anchor="middle">alive?</text>

  <!-- LEFT: PID alive → keep running -->
  <line x1="210" y1="178" x2="100" y2="178" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="160" y="170" font-size="9" fill="#aaa">yes</text>

  <rect x="20" y="228" width="160" height="60" rx="5" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="100" y="248" font-size="10" fill="#666" text-anchor="middle" font-weight="500">Keep running</text>
  <text x="100" y="264" font-size="9" fill="#999" text-anchor="middle">Task stays in_progress.</text>
  <text x="100" y="278" font-size="9" fill="#999" text-anchor="middle">Runner writes results when done.</text>

  <line x1="100" y1="178" x2="100" y2="228" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- RIGHT: PID dead → mark failed, retry -->
  <line x1="310" y1="178" x2="420" y2="178" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="360" y="170" font-size="9" fill="#aaa">no</text>

  <rect x="340" y="228" width="160" height="60" rx="5" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="420" y="248" font-size="10" fill="#666" text-anchor="middle" font-weight="500">Mark failed &amp; retry</text>
  <text x="420" y="264" font-size="9" fill="#999" text-anchor="middle">Runner crashed or was killed.</text>
  <text x="420" y="278" font-size="9" fill="#999" text-anchor="middle">Task goes back to pending.</text>

  <line x1="420" y1="178" x2="420" y2="228" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Continue normal operation -->
  <line x1="100" y1="288" x2="100" y2="310" stroke="#ccc" stroke-width="1"/>
  <line x1="100" y1="310" x2="260" y2="340" stroke="#ccc" stroke-width="1"/>
  <line x1="420" y1="288" x2="420" y2="310" stroke="#ccc" stroke-width="1"/>
  <line x1="420" y1="310" x2="260" y2="340" stroke="#ccc" stroke-width="1"/>

  <rect x="160" y="330" width="200" height="36" rx="18" fill="#f8f8f8" stroke="#888" stroke-width="1.5"/>
  <text x="260" y="353" font-size="12" fill="#333" text-anchor="middle" font-weight="500">Continue normal operation</text>
</svg>