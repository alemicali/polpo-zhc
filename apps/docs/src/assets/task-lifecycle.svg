<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 580" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#aaa"/>
    </marker>
    <marker id="arrowDark" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
  </defs>

  <!-- ── pending ──────────────────────────────────── -->
  <rect x="220" y="20" width="140" height="36" rx="18" fill="#f8f8f8" stroke="#888" stroke-width="1.5"/>
  <text x="290" y="43" font-size="13" fill="#333" text-anchor="middle" font-weight="500">pending</text>

  <!-- Branch: approval required? -->
  <line x1="290" y1="56" x2="290" y2="85" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="298" y="76" font-size="9" fill="#aaa" font-style="italic">approval required?</text>

  <!-- Diamond -->
  <polygon points="290,88 320,108 290,128 260,108" fill="#f8f8f8" stroke="#888" stroke-width="1.2"/>
  <text x="290" y="112" font-size="9" fill="#666" text-anchor="middle">?</text>

  <!-- YES branch (left) → awaiting_approval -->
  <line x1="260" y1="108" x2="170" y2="108" stroke="#aaa" stroke-width="1.2"/>
  <line x1="170" y1="108" x2="170" y2="140" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="210" y="102" font-size="9" fill="#aaa">yes</text>

  <rect x="80" y="140" width="180" height="36" rx="18" fill="#f8f8f8" stroke="#888" stroke-width="1.5"/>
  <text x="170" y="163" font-size="12" fill="#333" text-anchor="middle" font-weight="500">awaiting_approval</text>

  <!-- Approved → rejoin main flow -->
  <line x1="170" y1="176" x2="170" y2="200" stroke="#aaa" stroke-width="1.2"/>
  <text x="130" y="195" font-size="9" fill="#aaa">approved</text>
  <line x1="170" y1="200" x2="290" y2="200" stroke="#aaa" stroke-width="1.2"/>

  <!-- Rejected → failed (small box to the left) -->
  <line x1="80" y1="158" x2="40" y2="158" stroke="#aaa" stroke-width="1.2"/>
  <line x1="40" y1="158" x2="40" y2="490" stroke="#aaa" stroke-width="1.2" stroke-dasharray="4 2"/>
  <line x1="40" y1="490" x2="190" y2="490" stroke="#aaa" stroke-width="1.2" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
  <text x="20" y="300" font-size="9" fill="#bbb" transform="rotate(-90 20 300)">rejected / timeout</text>

  <!-- NO branch (right) → straight down -->
  <line x1="320" y1="108" x2="380" y2="108" stroke="#aaa" stroke-width="1.2"/>
  <line x1="380" y1="108" x2="380" y2="200" stroke="#aaa" stroke-width="1.2"/>
  <line x1="380" y1="200" x2="290" y2="200" stroke="#aaa" stroke-width="1.2"/>
  <text x="338" y="102" font-size="9" fill="#aaa">no</text>

  <!-- ── assigned ─────────────────────────────────── -->
  <line x1="290" y1="200" x2="290" y2="220" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="220" y="220" width="140" height="36" rx="18" fill="#f8f8f8" stroke="#888" stroke-width="1.5"/>
  <text x="290" y="243" font-size="13" fill="#333" text-anchor="middle" font-weight="500">assigned</text>
  <text x="370" y="243" font-size="9" fill="#aaa" font-style="italic">agent selected</text>

  <!-- ── in_progress ──────────────────────────────── -->
  <line x1="290" y1="256" x2="290" y2="290" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="298" y="278" font-size="9" fill="#aaa">runner spawned</text>
  <rect x="220" y="290" width="140" height="36" rx="18" fill="#f8f8f8" stroke="#888" stroke-width="1.5"/>
  <text x="290" y="313" font-size="13" fill="#333" text-anchor="middle" font-weight="500">in_progress</text>

  <!-- ── review ───────────────────────────────────── -->
  <line x1="290" y1="326" x2="290" y2="360" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="298" y="348" font-size="9" fill="#aaa">agent finishes</text>
  <rect x="220" y="360" width="140" height="36" rx="18" fill="#f8f8f8" stroke="#888" stroke-width="1.5"/>
  <text x="290" y="383" font-size="13" fill="#333" text-anchor="middle" font-weight="500">review</text>

  <!-- Branch from review -->
  <line x1="240" y1="396" x2="160" y2="430" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="182" y="415" font-size="9" fill="#aaa">passed</text>
  <line x1="340" y1="396" x2="420" y2="430" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="386" y="415" font-size="9" fill="#aaa">failed</text>

  <!-- ── done ─────────────────────────────────────── -->
  <rect x="90" y="430" width="140" height="36" rx="18" fill="#f8f8f8" stroke="#888" stroke-width="1.5"/>
  <text x="160" y="453" font-size="13" fill="#333" text-anchor="middle" font-weight="600">done</text>

  <!-- ── failed ───────────────────────────────────── -->
  <rect x="350" y="430" width="140" height="36" rx="18" fill="#f8f8f8" stroke="#888" stroke-width="1.5"/>
  <text x="420" y="453" font-size="13" fill="#333" text-anchor="middle" font-weight="600">failed</text>

  <!-- Retry loop: failed → pending -->
  <line x1="490" y1="448" x2="540" y2="448" stroke="#aaa" stroke-width="1.2"/>
  <line x1="540" y1="448" x2="540" y2="38" stroke="#aaa" stroke-width="1.2" stroke-dasharray="4 2"/>
  <line x1="540" y1="38" x2="360" y2="38" stroke="#aaa" stroke-width="1.2" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
  <text x="548" y="250" font-size="9" fill="#bbb" transform="rotate(-90 548 250)">retry (if retries remaining)</text>

  <!-- Fix loop: failed → in_progress -->
  <path d="M 420 466 Q 420 500 480 500 Q 540 500 540 308 Q 540 308 360 308" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrow)"/>
  <text x="500" y="410" font-size="9" fill="#bbb" transform="rotate(-90 500 410)">fix phase</text>

  <!-- ── Phase labels ─────────────────────────────── -->
  <rect x="100" y="540" width="400" height="28" rx="4" fill="none" stroke="#ddd" stroke-width="1"/>
  <text x="120" y="559" font-size="10" fill="#999">Phases within in_progress:</text>
  <text x="300" y="559" font-size="10" fill="#888" font-weight="500">execution → review → fix → clarification</text>

  <!-- rejected arrow label at bottom of failed box -->
  <rect x="190" y="476" width="120" height="28" rx="14" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="250" y="495" font-size="10" fill="#999" text-anchor="middle">or max retries</text>
</svg>