<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 220" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#aaa"/>
    </marker>
  </defs>

  <!-- Task fails -->
  <rect x="140" y="20" width="210" height="32" rx="16" fill="#f8f8f8" stroke="#888" stroke-width="1.3"/>
  <text x="245" y="41" font-size="11" fill="#333" text-anchor="middle" font-weight="500">Task fails assessment</text>

  <line x1="245" y1="52" x2="245" y2="80" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Question -->
  <polygon points="245,80 310,110 245,140 180,110" fill="#f8f8f8" stroke="#888" stroke-width="1.2"/>
  <text x="245" y="108" font-size="9" fill="#666" text-anchor="middle">Agent did the</text>
  <text x="245" y="119" font-size="9" fill="#666" text-anchor="middle">work correctly?</text>

  <!-- YES -->
  <line x1="180" y1="110" x2="80" y2="110" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="135" y="103" font-size="9" fill="#aaa">yes</text>

  <rect x="10" y="150" width="140" height="44" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="80" y="169" font-size="10" fill="#444" text-anchor="middle" font-weight="500">Correct expectations</text>
  <text x="80" y="184" font-size="9" fill="#999" text-anchor="middle">then re-assess</text>
  <line x1="80" y1="110" x2="80" y2="150" stroke="#aaa" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- NO -->
  <line x1="310" y1="110" x2="410" y2="110" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="355" y="103" font-size="9" fill="#aaa">no</text>

  <rect x="340" y="150" width="140" height="44" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="410" y="169" font-size="10" fill="#444" text-anchor="middle" font-weight="500">Normal retry/fix</text>
  <text x="410" y="184" font-size="9" fill="#999" text-anchor="middle">agent needs to fix</text>
  <line x1="410" y1="110" x2="410" y2="150" stroke="#aaa" stroke-width="1" marker-end="url(#arrow)"/>
</svg>