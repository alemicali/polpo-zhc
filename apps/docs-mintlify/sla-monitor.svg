<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#aaa"/>
    </marker>
  </defs>

  <!-- Task created -->
  <rect x="130" y="20" width="220" height="32" rx="16" fill="#f8f8f8" stroke="#888" stroke-width="1.3"/>
  <text x="240" y="41" font-size="11" fill="#333" text-anchor="middle" font-weight="500">Task created (with deadline)</text>

  <!-- Branches -->
  <line x1="160" y1="52" x2="80"  y2="90" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="240" y1="52" x2="240" y2="90" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="320" y1="52" x2="400" y2="90" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- 80% warning -->
  <rect x="10" y="90" width="140" height="48" rx="5" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="80" y="110" font-size="10" fill="#444" text-anchor="middle" font-weight="500">80% elapsed</text>
  <text x="80" y="128" font-size="9" fill="#999" text-anchor="middle">sla:warning</text>

  <!-- Deadline passed -->
  <rect x="170" y="90" width="140" height="48" rx="5" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="240" y="110" font-size="10" fill="#444" text-anchor="middle" font-weight="500">Deadline passed</text>
  <text x="240" y="128" font-size="9" fill="#999" text-anchor="middle">sla:violated</text>

  <!-- Completes in time -->
  <rect x="330" y="90" width="140" height="48" rx="5" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="400" y="110" font-size="10" fill="#444" text-anchor="middle" font-weight="500">Completes in time</text>
  <text x="400" y="128" font-size="9" fill="#999" text-anchor="middle">sla:met</text>

  <!-- Optional force-fail note -->
  <line x1="240" y1="138" x2="240" y2="165" stroke="#ccc" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrow)"/>
  <rect x="170" y="165" width="140" height="24" rx="4" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="240" y="182" font-size="9" fill="#bbb" text-anchor="middle">optionally force-fail</text>
</svg>