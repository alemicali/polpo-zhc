<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <!-- Level 1: Global -->
  <rect x="20" y="20" width="360" height="120" rx="6" fill="none" stroke="#ccc" stroke-width="1.2" stroke-dasharray="6 3"/>
  <text x="40" y="42" font-size="11" fill="#888" font-weight="500">Global rules</text>
  <text x="40" y="56" font-size="9" fill="#bbb">settings.notifications.rules</text>

  <!-- Level 2: Plan -->
  <rect x="50" y="66" width="310" height="60" rx="5" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="70" y="84" font-size="11" fill="#888" font-weight="500">Plan-level rules</text>
  <text x="70" y="98" font-size="9" fill="#bbb">plan.notifications</text>

  <!-- Level 3: Task -->
  <rect x="80" y="104" width="260" height="28" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="100" y="123" font-size="11" fill="#666" font-weight="500">Task-level rules</text>
  <text x="260" y="123" font-size="9" fill="#bbb">task.notifications</text>
</svg>