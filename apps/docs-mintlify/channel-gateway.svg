<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#aaa"/>
    </marker>
  </defs>

  <!-- Messaging Channels -->
  <rect x="20" y="20" width="100" height="28" rx="4" fill="#f8f8f8" stroke="#888" stroke-width="1.2"/>
  <text x="70" y="39" font-size="10" fill="#333" text-anchor="middle">Telegram</text>

  <rect x="20" y="58" width="100" height="28" rx="4" fill="#f8f8f8" stroke="#ccc" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="70" y="77" font-size="10" fill="#aaa" text-anchor="middle">WhatsApp</text>

  <rect x="20" y="96" width="100" height="28" rx="4" fill="#f8f8f8" stroke="#ccc" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="70" y="115" font-size="10" fill="#aaa" text-anchor="middle">Slack / Discord</text>

  <!-- Arrows to adapter -->
  <line x1="120" y1="34" x2="160" y2="68" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="120" y1="72" x2="160" y2="72" stroke="#ccc" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrow)"/>
  <line x1="120" y1="110" x2="160" y2="76" stroke="#ccc" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrow)"/>

  <!-- Channel Adapter -->
  <rect x="160" y="56" width="130" height="32" rx="5" fill="#f8f8f8" stroke="#888" stroke-width="1.2"/>
  <text x="225" y="77" font-size="10" fill="#333" text-anchor="middle">Channel Adapter</text>

  <!-- Arrow down -->
  <line x1="225" y1="88" x2="225" y2="120" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="245" y="108" font-size="8" fill="#bbb">InboundMessage</text>

  <!-- Channel Gateway -->
  <rect x="130" y="120" width="190" height="36" rx="16" fill="#f8f8f8" stroke="#888" stroke-width="1.3"/>
  <text x="225" y="143" font-size="12" fill="#333" text-anchor="middle" font-weight="500">ChannelGateway</text>

  <!-- Branch lines -->
  <line x1="160" y1="156" x2="80" y2="195" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="225" y1="156" x2="225" y2="195" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="290" y1="156" x2="390" y2="195" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="320" y1="145" x2="470" y2="145" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- PeerStore -->
  <rect x="20" y="195" width="120" height="44" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="80" y="214" font-size="10" fill="#444" text-anchor="middle" font-weight="500">PeerStore</text>
  <text x="80" y="230" font-size="9" fill="#999" text-anchor="middle">identity, policy, pairing</text>

  <!-- Slash Commands -->
  <rect x="160" y="195" width="130" height="44" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="225" y="214" font-size="10" fill="#444" text-anchor="middle" font-weight="500">Slash Commands</text>
  <text x="225" y="230" font-size="9" fill="#999" text-anchor="middle">/status /tasks /approve</text>

  <!-- Completions Loop -->
  <rect x="320" y="195" width="140" height="44" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="390" y="214" font-size="10" fill="#444" text-anchor="middle" font-weight="500">Completions Loop</text>
  <text x="390" y="230" font-size="9" fill="#999" text-anchor="middle">37+ tools, multi-turn</text>

  <!-- Session Store -->
  <rect x="470" y="130" width="80" height="32" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="510" y="151" font-size="10" fill="#444" text-anchor="middle">Sessions</text>

  <!-- Response arrows back -->
  <line x1="80" y1="239" x2="80" y2="270" stroke="#ccc" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="225" y1="239" x2="225" y2="270" stroke="#ccc" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="390" y1="239" x2="390" y2="270" stroke="#ccc" stroke-width="1" marker-end="url(#arrow)"/>

  <text x="80" y="285" font-size="9" fill="#888" text-anchor="middle">.polpo/peers/</text>
  <text x="225" y="285" font-size="9" fill="#888" text-anchor="middle">Response text</text>
  <text x="390" y="285" font-size="9" fill="#888" text-anchor="middle">AI response</text>
</svg>
