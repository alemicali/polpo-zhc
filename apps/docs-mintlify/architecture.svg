<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#aaa"/>
    </marker>
  </defs>

  <!-- ── Interface Layer ──────────────────────────── -->
  <rect x="40" y="20" width="640" height="70" rx="8" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="60" y="42" font-size="11" fill="#888" font-weight="600" letter-spacing="0.5">INTERFACE LAYER</text>
  <rect x="60"  y="52" width="70" height="28" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="95"  y="71" font-size="12" fill="#444" text-anchor="middle">CLI</text>
  <rect x="150" y="52" width="70" height="28" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="185" y="71" font-size="12" fill="#444" text-anchor="middle">TUI</text>
  <rect x="240" y="52" width="80" height="28" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="280" y="71" font-size="12" fill="#444" text-anchor="middle">Web UI</text>
  <rect x="340" y="52" width="110" height="28" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="395" y="71" font-size="12" fill="#444" text-anchor="middle">REST API / SSE</text>

  <!-- Arrow: Interface → Core -->
  <line x1="360" y1="90" x2="360" y2="120" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Orchestrator Core ────────────────────────── -->
  <rect x="40" y="120" width="640" height="160" rx="8" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="60" y="142" font-size="11" fill="#888" font-weight="600" letter-spacing="0.5">ORCHESTRATOR CORE</text>

  <rect x="60"  y="155" width="140" height="36" rx="5" fill="#f8f8f8" stroke="#888" stroke-width="1.2"/>
  <text x="130" y="178" font-size="12" fill="#333" text-anchor="middle" font-weight="500">Supervisor Loop</text>
  <rect x="220" y="155" width="120" height="36" rx="5" fill="#f8f8f8" stroke="#888" stroke-width="1.2"/>
  <text x="280" y="178" font-size="12" fill="#333" text-anchor="middle" font-weight="500">Task Registry</text>
  <rect x="360" y="155" width="120" height="36" rx="5" fill="#f8f8f8" stroke="#888" stroke-width="1.2"/>
  <text x="420" y="178" font-size="12" fill="#333" text-anchor="middle" font-weight="500">Plan Executor</text>
  <rect x="500" y="155" width="160" height="36" rx="5" fill="#f8f8f8" stroke="#888" stroke-width="1.2"/>
  <text x="580" y="178" font-size="12" fill="#333" text-anchor="middle" font-weight="500">Assessor (G-Eval)</text>

  <!-- Managers row -->
  <rect x="60" y="210" width="600" height="56" rx="5" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="75" y="228" font-size="10" fill="#999" font-weight="500" letter-spacing="0.3">MANAGERS</text>
  <text x="75"  y="252" font-size="11" fill="#666">Approval</text>
  <text x="160" y="252" font-size="11" fill="#666">Escalation</text>
  <text x="260" y="252" font-size="11" fill="#666">Deadlock</text>
  <text x="345" y="252" font-size="11" fill="#666">Quality</text>
  <text x="420" y="252" font-size="11" fill="#666">SLA</text>
  <text x="475" y="252" font-size="11" fill="#666">Scheduler</text>
  <text x="565" y="252" font-size="11" fill="#666">Notifications</text>

  <!-- Arrow: Core → Runners (spawn) -->
  <line x1="240" y1="280" x2="240" y2="320" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="248" y="305" font-size="10" fill="#aaa">spawn</text>

  <!-- Arrow: Core → Persistence -->
  <line x1="500" y1="280" x2="500" y2="320" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Detached Runners ─────────────────────────── -->
  <rect x="40" y="320" width="310" height="170" rx="8" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="60" y="342" font-size="11" fill="#888" font-weight="600" letter-spacing="0.5">DETACHED RUNNERS</text>

  <rect x="60"  y="355" width="90" height="28" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="105" y="374" font-size="11" fill="#444" text-anchor="middle">Runner 1</text>
  <line x1="150" y1="369" x2="180" y2="369" stroke="#aaa" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="180" y="355" width="140" height="28" rx="4" fill="#f8f8f8" stroke="#888" stroke-width="1"/>
  <text x="250" y="374" font-size="11" fill="#333" text-anchor="middle">Agent A</text>

  <rect x="60"  y="395" width="90" height="28" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="105" y="414" font-size="11" fill="#444" text-anchor="middle">Runner 2</text>
  <line x1="150" y1="409" x2="180" y2="409" stroke="#aaa" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="180" y="395" width="140" height="28" rx="4" fill="#f8f8f8" stroke="#888" stroke-width="1"/>
  <text x="250" y="414" font-size="11" fill="#333" text-anchor="middle">Agent B</text>

  <rect x="60"  y="435" width="90" height="28" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="105" y="454" font-size="11" fill="#444" text-anchor="middle">Runner N</text>
  <line x1="150" y1="449" x2="180" y2="449" stroke="#aaa" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="180" y="435" width="140" height="28" rx="4" fill="#f8f8f8" stroke="#888" stroke-width="1"/>
  <text x="250" y="454" font-size="11" fill="#333" text-anchor="middle">Agent N</text>

  <!-- Arrow: Runners → RunStore (write results) -->
  <path d="M 350 410 Q 400 410 420 380 Q 440 350 440 340" fill="none" stroke="#aaa" stroke-width="1.2" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
  <text x="385" y="365" font-size="9" fill="#aaa">write results</text>

  <!-- ── Persistence ──────────────────────────────── -->
  <rect x="390" y="320" width="290" height="170" rx="8" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="410" y="342" font-size="11" fill="#888" font-weight="600" letter-spacing="0.5">PERSISTENCE</text>

  <rect x="410" y="358" width="110" height="28" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="465" y="377" font-size="11" fill="#444" text-anchor="middle">TaskStore</text>
  <rect x="540" y="358" width="110" height="28" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="595" y="377" font-size="11" fill="#444" text-anchor="middle">RunStore</text>
  <rect x="410" y="400" width="110" height="28" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="465" y="419" font-size="11" fill="#444" text-anchor="middle">LogStore</text>
  <rect x="540" y="400" width="110" height="28" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="595" y="419" font-size="11" fill="#444" text-anchor="middle">Memory</text>
  <rect x="410" y="442" width="110" height="28" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="465" y="461" font-size="11" fill="#444" text-anchor="middle">PlanStore</text>
  <rect x="540" y="442" width="110" height="28" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="595" y="461" font-size="11" fill="#444" text-anchor="middle">Event Emitter</text>

  <!-- Arrow: RunStore → Core (read results) -->
  <path d="M 595 358 Q 595 310 560 295 Q 530 280 520 280" fill="none" stroke="#aaa" stroke-width="1.2" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
  <text x="570" y="308" font-size="9" fill="#aaa">read results</text>
</svg>