<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 240" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#aaa"/>
    </marker>
  </defs>

  <!-- Orchestrator tick -->
  <rect x="150" y="20" width="180" height="32" rx="16" fill="#f8f8f8" stroke="#888" stroke-width="1.3"/>
  <text x="240" y="41" font-size="12" fill="#333" text-anchor="middle" font-weight="500">Orchestrator tick</text>

  <line x1="240" y1="52" x2="240" y2="80" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Scheduler.check -->
  <rect x="150" y="80" width="180" height="32" rx="5" fill="#f8f8f8" stroke="#888" stroke-width="1.2"/>
  <text x="240" y="101" font-size="11" fill="#333" text-anchor="middle">Scheduler.check()</text>

  <!-- Cron branch -->
  <line x1="180" y1="112" x2="110" y2="145" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="20" y="145" width="180" height="44" rx="5" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="110" y="164" font-size="10" fill="#444" text-anchor="middle">Cron: "0 2 * * *"</text>
  <text x="110" y="180" font-size="9" fill="#999" text-anchor="middle">now >= next run? → trigger</text>

  <!-- One-shot branch -->
  <line x1="300" y1="112" x2="370" y2="145" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="280" y="145" width="200" height="44" rx="5" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="380" y="164" font-size="10" fill="#444" text-anchor="middle">One-shot: "2026-03-01T10:00"</text>
  <text x="380" y="180" font-size="9" fill="#999" text-anchor="middle">now >= time? → trigger</text>

  <!-- Trigger arrows -->
  <line x1="110" y1="189" x2="110" y2="215" stroke="#ccc" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="110" y="230" font-size="10" fill="#888" text-anchor="middle" font-weight="500">Execute plan</text>
  <line x1="380" y1="189" x2="380" y2="215" stroke="#ccc" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="380" y="230" font-size="10" fill="#888" text-anchor="middle" font-weight="500">Execute plan</text>
</svg>