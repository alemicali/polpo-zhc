<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 160" font-family="'Geist Mono', 'SF Mono', 'Fira Code', monospace">
  <!-- Stars -->
  <text x="60" y="130" font-size="20" fill="#333" text-anchor="middle">*</text>
  <text x="110" y="130" font-size="20" fill="#333" text-anchor="middle">*</text>
  <text x="160" y="130" font-size="20" fill="#333" text-anchor="middle">*</text>
  <text x="210" y="130" font-size="20" fill="#333" text-anchor="middle">*</text>
  <text x="260" y="130" font-size="20" fill="#333" text-anchor="middle">*</text>

  <!-- Lines up from each star -->
  <line x1="60"  y1="118" x2="60"  y2="28" stroke="#bbb" stroke-width="1"/>
  <line x1="110" y1="118" x2="110" y2="42" stroke="#bbb" stroke-width="1"/>
  <line x1="160" y1="118" x2="160" y2="56" stroke="#bbb" stroke-width="1"/>
  <line x1="210" y1="118" x2="210" y2="70" stroke="#bbb" stroke-width="1"/>
  <line x1="260" y1="118" x2="260" y2="84" stroke="#bbb" stroke-width="1"/>

  <!-- Labels -->
  <text x="70" y="28" font-size="11" fill="#666" font-family="system-ui, sans-serif">minute (0-59)</text>
  <text x="120" y="42" font-size="11" fill="#666" font-family="system-ui, sans-serif">hour (0-23)</text>
  <text x="170" y="56" font-size="11" fill="#666" font-family="system-ui, sans-serif">day of month (1-31)</text>
  <text x="220" y="70" font-size="11" fill="#666" font-family="system-ui, sans-serif">month (1-12)</text>
  <text x="270" y="84" font-size="11" fill="#666" font-family="system-ui, sans-serif">day of week (0-7)</text>
</svg>