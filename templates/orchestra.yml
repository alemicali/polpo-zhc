version: "1.0"
project: "my-project"

team:
  name: "default-team"
  description: "Default Orchestra team"
  agents:
    - name: "dev-1"
      command: "claude -p {prompt}"
      role: "developer"

tasks:
  - id: "example-task"
    title: "Example task"
    description: "Replace this with your actual task description"
    assignTo: "dev-1"
    dependsOn: []
    maxRetries: 3
    expectations:
      - type: "test"
        command: "npm test"
      - type: "file_exists"
        paths: ["src/index.ts"]
    metrics: []

settings:
  maxRetries: 3
  workDir: "."
  logLevel: "normal"
