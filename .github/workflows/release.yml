name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run --filter @polpo-ai/react build

      - name: Publish @polpo-ai/polpo
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @polpo-ai/react
        run: pnpm publish --no-git-checks --access public --filter @polpo-ai/react
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Desktop app builds (Electron) ──────────────────────────────────
  desktop:
    name: Desktop (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: pnpm install --frozen-lockfile

      # 1. Build the TypeScript source (needed for sidecar compilation)
      - name: Build TypeScript
        run: ./node_modules/.bin/tsc
        shell: bash

      # 2. Build the sidecar server binary with Bun
      - name: Build sidecar (Linux/macOS)
        if: matrix.platform != 'win'
        run: bash ui/binaries/build-sidecar.sh

      - name: Build sidecar (Windows)
        if: matrix.platform == 'win'
        run: |
          cd $env:GITHUB_WORKSPACE
          bun build dist/cli/index.js --compile --outfile ui/binaries/polpo-server.exe
        shell: pwsh

      # 3. Sync version from git tag into ui/package.json
      - name: Sync version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd ui
          node -e "const p=require('./package.json'); p.version='$VERSION'; require('fs').writeFileSync('./package.json', JSON.stringify(p, null, 2)+'\n')"
        shell: bash

      # 4. Build Vite UI + Electron package
      - name: Build Electron app
        run: pnpm run electron:build
        working-directory: ui
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 5. Upload artifacts to the GitHub Release
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ui/release/*.AppImage
            ui/release/*.deb
            ui/release/*.dmg
            ui/release/*.zip
            ui/release/*.exe
            ui/release/latest-linux.yml
            ui/release/latest-mac.yml
            ui/release/latest.yml

  # ── GitHub Release (created after all jobs) ────────────────────────
  release:
    name: GitHub Release
    needs: [npm, docker, desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
