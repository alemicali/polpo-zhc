name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  # ── Build (runs once, produces artifacts for desktop) ──
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Build full workspace chain (once)
      - name: Build all packages
        run: |
          pnpm --filter @polpo-ai/core build
          pnpm --filter @polpo-ai/drizzle build
          pnpm --filter @polpo-ai/client build
          ./node_modules/.bin/tsc
          pnpm --filter @polpo-ai/react build

      # Sync version + build Vite UI for desktop
      - name: Sync version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "const p=require('./ui/package.json'); p.version='$VERSION'; require('fs').writeFileSync('./ui/package.json', JSON.stringify(p, null, 2)+'\n')"

      - name: Build Vite UI
        run: VITE_POLPO_API_URL=http://localhost:3890 pnpm exec vite build
        working-directory: ui

      # Upload for desktop jobs
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-build
          retention-days: 1
          path: |
            dist/
            packages/core/dist/
            packages/drizzle/dist/
            packages/client-sdk/dist/
            packages/react-sdk/dist/
            ui/dist/
            ui/electron/
            ui/package.json

  # ── Docker (independent, runs in parallel with build) ──────────────
  docker:
    name: Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Desktop packaging (3 OS in parallel, depends on build) ─────────
  desktop:
    name: Desktop (${{ matrix.platform }})
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-build

      # OS-specific sidecar
      - name: Build sidecar (Unix)
        if: matrix.platform != 'win'
        run: bash ui/binaries/build-sidecar.sh

      - name: Build sidecar (Windows)
        if: matrix.platform == 'win'
        run: bun build dist/cli/index.js --compile --external chromium-bidi --external playwright-core --external playwright --outfile ui/binaries/polpo-server.exe
        shell: pwsh

      # Package
      - name: Package Electron app
        run: pnpm exec electron-builder --publish never
        working-directory: ui

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ui/release/*.AppImage
            ui/release/*.deb
            ui/release/*.dmg
            ui/release/*.zip
            ui/release/*.exe
            ui/release/latest-linux.yml
            ui/release/latest-mac.yml
            ui/release/latest.yml

  # ── Finalize release notes ─────────────────────────────────────────
  release:
    name: Release Notes
    needs: [build, docker, desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
