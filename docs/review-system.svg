<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#aaa"/>
    </marker>
  </defs>

  <!-- Agent output -->
  <rect x="220" y="12" width="160" height="32" rx="16" fill="#f8f8f8" stroke="#888" stroke-width="1.3"/>
  <text x="300" y="33" font-size="11" fill="#333" text-anchor="middle" font-weight="500">Agent completes task</text>

  <line x1="300" y1="44" x2="300" y2="68" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Expectations box -->
  <rect x="170" y="68" width="260" height="32" rx="5" fill="#f8f8f8" stroke="#888" stroke-width="1.2"/>
  <text x="300" y="89" font-size="10" fill="#444" text-anchor="middle">Run expectations: file_exists, test, script</text>

  <line x1="300" y1="100" x2="300" y2="124" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="308" y="116" font-size="8" fill="#bbb" font-style="italic">all pass</text>

  <!-- 3 parallel reviewers -->
  <rect x="40" y="124" width="520" height="90" rx="6" fill="none" stroke="#ccc" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="300" y="140" font-size="10" fill="#999" text-anchor="middle" font-weight="500">3 G-Eval Reviewer Agents (parallel)</text>

  <rect x="60" y="150" width="140" height="50" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="130" y="171" font-size="10" fill="#444" text-anchor="middle" font-weight="500">Reviewer 1</text>
  <text x="130" y="189" font-size="8" fill="#999" text-anchor="middle">reads code + scores</text>

  <rect x="230" y="150" width="140" height="50" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="300" y="171" font-size="10" fill="#444" text-anchor="middle" font-weight="500">Reviewer 2</text>
  <text x="300" y="189" font-size="8" fill="#999" text-anchor="middle">reads code + scores</text>

  <rect x="400" y="150" width="140" height="50" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="470" y="171" font-size="10" fill="#444" text-anchor="middle" font-weight="500">Reviewer 3</text>
  <text x="470" y="189" font-size="8" fill="#999" text-anchor="middle">reads code + scores</text>

  <!-- Consensus -->
  <line x1="300" y1="214" x2="300" y2="238" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="190" y="238" width="220" height="32" rx="5" fill="#f8f8f8" stroke="#888" stroke-width="1.3"/>
  <text x="300" y="259" font-size="10" fill="#333" text-anchor="middle" font-weight="500">Median consensus scoring</text>

  <!-- Decision diamond -->
  <line x1="300" y1="270" x2="300" y2="290" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>

  <polygon points="300,290 360,310 300,330 240,310" fill="#f8f8f8" stroke="#888" stroke-width="1.2"/>
  <text x="300" y="314" font-size="9" fill="#666" text-anchor="middle">passed?</text>

  <!-- YES -->
  <line x1="360" y1="310" x2="460" y2="310" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="405" y="303" font-size="9" fill="#aaa">yes</text>
  <rect x="460" y="296" width="100" height="28" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="510" y="315" font-size="10" fill="#444" text-anchor="middle">Done</text>

  <!-- NO -->
  <line x1="240" y1="310" x2="140" y2="310" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="195" y="303" font-size="9" fill="#aaa">no</text>
  <rect x="20" y="296" width="120" height="28" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="80" y="312" font-size="9" fill="#444" text-anchor="middle">Expectation Judge</text>
  <text x="80" y="322" font-size="8" fill="#999" text-anchor="middle">fix or retry</text>
</svg>
