<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 60" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#aaa"/>
    </marker>
  </defs>

  <rect x="10" y="16" width="100" height="28" rx="4" fill="#f8f8f8" stroke="#888" stroke-width="1.2"/>
  <text x="60" y="35" font-size="10" fill="#333" text-anchor="middle">Agent (runner)</text>

  <line x1="110" y1="30" x2="138" y2="30" stroke="#aaa" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="124" y="22" font-size="8" fill="#bbb">1.5s</text>

  <rect x="138" y="16" width="80" height="28" rx="4" fill="#f8f8f8" stroke="#888" stroke-width="1.2"/>
  <text x="178" y="35" font-size="10" fill="#333" text-anchor="middle">RunStore</text>

  <line x1="218" y1="30" x2="246" y2="30" stroke="#aaa" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="232" y="22" font-size="8" fill="#bbb">tick</text>

  <rect x="246" y="16" width="100" height="28" rx="4" fill="#f8f8f8" stroke="#888" stroke-width="1.2"/>
