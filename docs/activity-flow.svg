  <line x1="346" y1="30" x2="374" y2="30" stroke="#aaa" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="374" y="16" width="110" height="28" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="429" y="35" font-size="10" fill="#444" text-anchor="middle">agent:activity</text>

  <line x1="484" y1="30" x2="512" y2="30" stroke="#aaa" stroke-width="1" marker-end="url(#arrow)"/>

  <rect x="512" y="16" width="110" height="28" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="567" y="35" font-size="10" fill="#444" text-anchor="middle">TUI / Web UI</text>
