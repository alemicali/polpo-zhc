<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 240" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#aaa"/>
    </marker>
  </defs>

  <!-- Orchestrator Events -->
  <rect x="140" y="20" width="200" height="32" rx="16" fill="#f8f8f8" stroke="#888" stroke-width="1.3"/>
  <text x="240" y="41" font-size="12" fill="#333" text-anchor="middle" font-weight="500">Orchestrator Events</text>

  <line x1="240" y1="52" x2="240" y2="80" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- NotificationRouter -->
  <rect x="140" y="80" width="200" height="32" rx="5" fill="#f8f8f8" stroke="#888" stroke-width="1.2"/>
  <text x="240" y="101" font-size="11" fill="#333" text-anchor="middle">NotificationRouter</text>

  <!-- Rules -->
  <line x1="140" y1="112" x2="80" y2="145" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="240" y1="112" x2="240" y2="145" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="340" y1="112" x2="400" y2="145" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Rule 1 -->
  <rect x="10" y="145" width="140" height="44" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="80" y="164" font-size="10" fill="#444" text-anchor="middle" font-weight="500">task:* failed</text>
  <text x="80" y="180" font-size="9" fill="#999" text-anchor="middle">→ #slack-alerts</text>

  <!-- Rule 2 -->
  <rect x="170" y="145" width="140" height="44" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="240" y="164" font-size="10" fill="#444" text-anchor="middle" font-weight="500">sla:**</text>
  <text x="240" y="180" font-size="9" fill="#999" text-anchor="middle">→ #ops-email</text>

  <!-- Rule 3 -->
  <rect x="330" y="145" width="140" height="44" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="400" y="164" font-size="10" fill="#444" text-anchor="middle" font-weight="500">escalation:human</text>
  <text x="400" y="180" font-size="9" fill="#999" text-anchor="middle">→ #telegram-oncall</text>

  <!-- Channels -->
  <line x1="80"  y1="189" x2="80"  y2="215" stroke="#ccc" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="240" y1="189" x2="240" y2="215" stroke="#ccc" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="400" y1="189" x2="400" y2="215" stroke="#ccc" stroke-width="1" marker-end="url(#arrow)"/>

  <text x="80"  y="230" font-size="9" fill="#888" text-anchor="middle">Slack</text>
  <text x="240" y="230" font-size="9" fill="#888" text-anchor="middle">Email</text>
  <text x="400" y="230" font-size="9" fill="#888" text-anchor="middle">Telegram</text>
</svg>