  <text x="337" y="26" font-size="8" fill="#bbb">depends</text>

  <!-- Task C (pending) -->
  <rect x="360" y="16" width="140" height="36" rx="5" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
