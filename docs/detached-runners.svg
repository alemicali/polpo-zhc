<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 420" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#aaa"/>
    </marker>
    <marker id="arrowDark" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
    </marker>
  </defs>

  <!-- ── Left: Orchestrator ───────────────────────── -->
  <rect x="30" y="20" width="240" height="380" rx="8" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="50" y="42" font-size="11" fill="#888" font-weight="600" letter-spacing="0.5">ORCHESTRATOR PROCESS</text>

  <!-- Step 1: Write config -->
  <rect x="50" y="60" width="200" height="32" rx="5" fill="#f8f8f8" stroke="#888" stroke-width="1.2"/>
  <text x="150" y="81" font-size="11" fill="#333" text-anchor="middle">1. Write config to tmp file</text>

  <!-- Step 2: Spawn runner -->
  <rect x="50" y="110" width="200" height="32" rx="5" fill="#f8f8f8" stroke="#888" stroke-width="1.2"/>
  <text x="150" y="127" font-size="10" fill="#333" text-anchor="middle">2. Spawn runner process</text>
  <text x="150" y="138" font-size="9" fill="#999" text-anchor="middle">detached: true, stdio: "ignore"</text>

  <!-- Vertical dots (orchestrator waits) -->
  <text x="150" y="168" font-size="14" fill="#ccc" text-anchor="middle">. . .</text>
  <text x="150" y="185" font-size="9" fill="#aaa" text-anchor="middle" font-style="italic">continues normal operation</text>

  <!-- Step 6: Read RunStore -->
  <rect x="50" y="210" width="200" height="32" rx="5" fill="#f8f8f8" stroke="#888" stroke-width="1.2"/>
  <text x="150" y="231" font-size="11" fill="#333" text-anchor="middle">6. Read results from RunStore</text>

  <!-- Step 7: Process result -->
  <rect x="50" y="260" width="200" height="32" rx="5" fill="#f8f8f8" stroke="#888" stroke-width="1.2"/>
  <text x="150" y="281" font-size="11" fill="#333" text-anchor="middle">7. Assess &amp; transition task</text>

  <!-- Arrows between orchestrator steps -->
  <line x1="150" y1="92" x2="150" y2="110" stroke="#ccc" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="150" y1="242" x2="150" y2="260" stroke="#ccc" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Crash resilience note -->
  <rect x="50" y="320" width="200" height="60" rx="5" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="60" y="340" font-size="9" fill="#999" font-weight="500">If orchestrator crashes:</text>
  <text x="60" y="355" font-size="9" fill="#999">Runners keep working.</text>
  <text x="60" y="370" font-size="9" fill="#999">On restart, reads RunStore to recover.</text>

  <!-- ── Right: Runner ────────────────────────────── -->
  <rect x="390" y="20" width="240" height="380" rx="8" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="410" y="42" font-size="11" fill="#888" font-weight="600" letter-spacing="0.5">RUNNER PROCESS (detached)</text>

  <!-- Step 3: Read config -->
  <rect x="410" y="110" width="200" height="32" rx="5" fill="#f8f8f8" stroke="#888" stroke-width="1.2"/>
  <text x="510" y="131" font-size="11" fill="#333" text-anchor="middle">3. Read config file</text>

  <!-- Step 4: Spawn agent -->
  <rect x="410" y="160" width="200" height="32" rx="5" fill="#f8f8f8" stroke="#888" stroke-width="1.2"/>
  <text x="510" y="181" font-size="11" fill="#333" text-anchor="middle">4. Initialize &amp; run agent</text>

  <!-- Activity polling -->
  <rect x="410" y="210" width="200" height="44" rx="5" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="510" y="229" font-size="10" fill="#999" text-anchor="middle">Poll activity</text>
  <text x="510" y="244" font-size="9" fill="#bbb" text-anchor="middle">tools, files, progress</text>

  <!-- Step 5: Write results -->
  <rect x="410" y="272" width="200" height="32" rx="5" fill="#f8f8f8" stroke="#888" stroke-width="1.2"/>
  <text x="510" y="293" font-size="11" fill="#333" text-anchor="middle">5. Write results to RunStore</text>

  <!-- Step: Exit -->
  <rect x="410" y="322" width="200" height="32" rx="5" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="510" y="343" font-size="11" fill="#666" text-anchor="middle">Exit when done</text>

  <!-- Arrows between runner steps -->
  <line x1="510" y1="142" x2="510" y2="160" stroke="#ccc" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="510" y1="192" x2="510" y2="210" stroke="#ccc" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="510" y1="254" x2="510" y2="272" stroke="#ccc" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="510" y1="304" x2="510" y2="322" stroke="#ccc" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ── Cross arrows ─────────────────────────────── -->
  <!-- Config file arrow: Orchestrator → Runner -->
  <path d="M 250 76 L 410 126" fill="none" stroke="#888" stroke-width="1.2" marker-end="url(#arrowDark)"/>
  <text x="330" y="90" font-size="9" fill="#888" text-anchor="middle">config (JSON)</text>

  <!-- Spawn arrow: Orchestrator → Runner -->
  <path d="M 250 126 L 390 126" fill="none" stroke="#888" stroke-width="1.2" stroke-dasharray="4 2" marker-end="url(#arrowDark)"/>

  <!-- RunStore arrow: Runner → Orchestrator -->
  <path d="M 410 288 L 250 226" fill="none" stroke="#888" stroke-width="1.2" stroke-dasharray="4 2" marker-end="url(#arrowDark)"/>
  <text x="330" y="270" font-size="9" fill="#888" text-anchor="middle">RunStore</text>
</svg>