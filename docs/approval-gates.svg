<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#aaa"/>
    </marker>
  </defs>

  <!-- Task lifecycle -->
  <rect x="170" y="20" width="160" height="32" rx="16" fill="#f8f8f8" stroke="#888" stroke-width="1.3"/>
  <text x="250" y="41" font-size="12" fill="#333" text-anchor="middle" font-weight="500">Task Lifecycle</text>

  <!-- Arrow down -->
  <line x1="250" y1="52" x2="250" y2="80" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Hook fires -->
  <rect x="130" y="80" width="240" height="32" rx="5" fill="#f8f8f8" stroke="#888" stroke-width="1.2"/>
  <text x="250" y="101" font-size="11" fill="#333" text-anchor="middle">before:task:assign hook fires</text>

  <!-- Branch -->
  <line x1="180" y1="112" x2="120" y2="150" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="320" y1="112" x2="380" y2="150" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Auto gate -->
  <rect x="30" y="150" width="180" height="32" rx="5" fill="#f8f8f8" stroke="#888" stroke-width="1.2"/>
  <text x="120" y="171" font-size="11" fill="#333" text-anchor="middle" font-weight="500">Auto Gate</text>

  <!-- Auto gate branches -->
  <line x1="70" y1="182" x2="70" y2="220" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="170" y1="182" x2="170" y2="220" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="30" y="220" width="80" height="28" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="70" y="239" font-size="10" fill="#666" text-anchor="middle">Block</text>
  <text x="70" y="260" font-size="9" fill="#aaa" text-anchor="middle">condition matches</text>

  <rect x="130" y="220" width="80" height="28" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="170" y="239" font-size="10" fill="#666" text-anchor="middle">Pass</text>
  <text x="170" y="260" font-size="9" fill="#aaa" text-anchor="middle">no match</text>

  <!-- Human gate -->
  <rect x="310" y="150" width="180" height="32" rx="5" fill="#f8f8f8" stroke="#888" stroke-width="1.2"/>
  <text x="400" y="171" font-size="11" fill="#333" text-anchor="middle" font-weight="500">Human Gate</text>

  <!-- Human gate branches -->
  <line x1="350" y1="182" x2="350" y2="220" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="450" y1="182" x2="450" y2="220" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="290" y="220" width="120" height="28" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="350" y="239" font-size="10" fill="#666" text-anchor="middle">awaiting_approval</text>
  <text x="350" y="260" font-size="9" fill="#aaa" text-anchor="middle">condition matches</text>

  <rect x="420" y="220" width="70" height="28" rx="4" fill="#f8f8f8" stroke="#bbb" stroke-width="1"/>
  <text x="455" y="239" font-size="10" fill="#666" text-anchor="middle">Pass</text>
  <text x="455" y="260" font-size="9" fill="#aaa" text-anchor="middle">no match</text>

  <!-- Approval events -->
  <line x1="350" y1="248" x2="350" y2="280" stroke="#ccc" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="270" y="280" width="160" height="24" rx="4" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="350" y="296" font-size="9" fill="#999" text-anchor="middle">approve / reject / timeout</text>
</svg>