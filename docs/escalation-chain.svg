<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 280" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#aaa"/>
    </marker>
  </defs>

  <!-- Task fails -->
  <rect x="100" y="20" width="260" height="32" rx="16" fill="#f8f8f8" stroke="#888" stroke-width="1.3"/>
  <text x="230" y="41" font-size="11" fill="#333" text-anchor="middle" font-weight="500">Task fails (maxRetries exhausted)</text>

  <line x1="230" y1="52" x2="230" y2="80" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Hook -->
  <rect x="120" y="80" width="220" height="32" rx="5" fill="#f8f8f8" stroke="#888" stroke-width="1.2"/>
  <text x="230" y="101" font-size="11" fill="#333" text-anchor="middle">before:task:fail hook</text>

  <line x1="230" y1="112" x2="230" y2="145" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Level 2 -->
  <rect x="80" y="145" width="300" height="36" rx="5" fill="#f8f8f8" stroke="#888" stroke-width="1.2"/>
  <text x="230" y="163" font-size="11" fill="#333" text-anchor="middle" font-weight="500">Level 2: LLM reformulates task</text>
  <text x="230" y="176" font-size="9" fill="#999" text-anchor="middle">orchestrator analyzes failure → retry</text>

  <!-- Still fails -->
  <line x1="230" y1="181" x2="230" y2="210" stroke="#aaa" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="238" y="200" font-size="9" fill="#aaa" font-style="italic">still fails</text>

  <!-- Level 3 -->
  <rect x="80" y="210" width="300" height="36" rx="5" fill="#f8f8f8" stroke="#888" stroke-width="1.2"/>
  <text x="230" y="228" font-size="11" fill="#333" text-anchor="middle" font-weight="500">Level 3: Human approval</text>
  <text x="230" y="241" font-size="9" fill="#999" text-anchor="middle">task → awaiting_approval</text>

  <!-- outcome -->
  <line x1="230" y1="246" x2="230" y2="268" stroke="#ccc" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="230" y="278" font-size="9" fill="#999" text-anchor="middle">approve (with feedback) / reject</text>
</svg>